<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle (WhatsApp style) -->
  <circle cx="128" cy="128" r="120" fill="#00ff00"/>

  <!-- Robot head -->
  <rect x="78" y="90" width="100" height="90" rx="15" fill="#0a0a0a" stroke="#00ff00" stroke-width="3"/>

  <!-- Antenna -->
  <line x1="128" y1="70" x2="128" y2="90" stroke="#00ff00" stroke-width="4" stroke-linecap="round"/>
  <circle cx="128" cy="70" r="6" fill="#00ff00"/>

  <!-- Eyes (LED style) -->
  <circle cx="100" cy="120" r="12" fill="#00ff00"/>
  <circle cx="156" cy="120" r="12" fill="#00ff00"/>

  <!-- Eye shine -->
  <circle cx="103" cy="117" r="4" fill="#0a0a0a"/>
  <circle cx="159" cy="117" r="4" fill="#0a0a0a"/>

  <!-- Mouth/speaker grille -->
  <rect x="95" y="150" width="66" height="20" rx="10" fill="#00ff00" opacity="0.3"/>
  <line x1="100" y1="155" x2="100" y2="165" stroke="#00ff00" stroke-width="2"/>
  <line x1="110" y1="155" x2="110" y2="165" stroke="#00ff00" stroke-width="2"/>
  <line x1="120" y1="155" x2="120" y2="165" stroke="#00ff00" stroke-width="2"/>
  <line x1="130" y1="155" x2="130" y2="165" stroke="#00ff00" stroke-width="2"/>
  <line x1="140" y1="155" x2="140" y2="165" stroke="#00ff00" stroke-width="2"/>
  <line x1="150" y1="155" x2="150" y2="165" stroke="#00ff00" stroke-width="2"/>

  <!-- Chat bubble tail (WhatsApp style) -->
  <path d="M 65 180 Q 50 200 55 210" fill="#00ff00"/>

  <!-- Circuit pattern details -->
  <circle cx="85" cy="105" r="3" fill="#00ff00" opacity="0.5"/>
  <line x1="85" y1="105" x2="95" y2="115" stroke="#00ff00" stroke-width="1" opacity="0.5"/>

  <circle cx="171" cy="105" r="3" fill="#00ff00" opacity="0.5"/>
  <line x1="171" y1="105" x2="161" y2="115" stroke="#00ff00" stroke-width="1" opacity="0.5"/>
</svg>
