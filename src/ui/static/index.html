<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Chat - Open Assistant</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">

    <!-- PWA Manifest -->
    <!-- Served as a static asset (not /api/pwa/manifest.json) so the platform
         proxy doesn't auth-gate it and trigger a CSP/redirect violation. -->
    <link rel="manifest" href="/static/manifest.json">

    <!-- Theme Colors -->
    <meta name="theme-color" content="#00ff00">
    <meta name="msapplication-TileColor" content="#0a0a0a">
    <meta name="msapplication-navbutton-color" content="#00ff00">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Assistant">
    <meta name="application-name" content="Open Assistant">

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/static/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="72x72" href="/static/icons/icon-72x72.png">
    <link rel="apple-touch-icon" sizes="96x96" href="/static/icons/icon-96x96.png">
    <link rel="apple-touch-icon" sizes="128x128" href="/static/icons/icon-128x128.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/static/icons/icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/static/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/static/icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="384x384" href="/static/icons/icon-384x384.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/static/icons/icon-512x512.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/mobile.css">
    <style>
        .chat-container {
            background: var(--card-background);
            border-radius: 0 16px 16px 0;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            width: 100%;
            height: calc(100vh - 140px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-layout:not(.sidebar-open) .chat-container {
            border-radius: 16px;
        }

        .chat-header {
            background: linear-gradient(135deg, #00ff00 0%, #00aa00 100%);
            color: var(--background-darker);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--primary-color);
        }

        .chat-header-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .chat-header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .conversation-id {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        #newConversationBtn {
            background: rgba(0, 0, 0, 0.2);
            color: var(--background-darker);
            border: 1px solid var(--background-darker);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        #newConversationBtn:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--background-color);
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .message-content {
            background: rgba(0, 255, 0, 0.15);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }

        .message.assistant .message-content {
            background: var(--card-background);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .message.error .message-content {
            background: var(--error-background);
            color: var(--error-color);
            border: 1px solid var(--error-color);
        }

        .chat-input-container {
            padding: 20px;
            background: var(--card-background);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 24px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            resize: none;
            font-family: inherit;
            max-height: 120px;
            background: var(--background-darker);
            color: var(--text-secondary);
        }

        #messageInput:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px var(--primary-glow);
            color: var(--text-primary);
        }

        #sendButton {
            padding: 12px 24px;
            background: rgba(0, 255, 0, 0.1);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            border-radius: 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        #sendButton:hover:not(:disabled) {
            background: rgba(0, 255, 0, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 0 12px var(--primary-glow);
        }

        #sendButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: var(--card-background);
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--primary-color);
            border-radius: 50%;
            animation: typing 1.4s infinite;
            box-shadow: 0 0 4px var(--primary-glow);
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Tool call progress cards */
        .tool-trace-container {
            margin: 4px 0 8px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: slideIn 0.2s ease-out;
        }

        .tool-call-card {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 6px 10px;
            border-left: 3px solid var(--border-color, #d1d5db);
            background: var(--surface-color, rgba(0,0,0,0.03));
            border-radius: 0 6px 6px 0;
            font-size: 0.82rem;
            transition: border-color 0.3s ease;
        }

        .tool-call-card.running {
            border-color: #3b82f6;
        }

        .tool-call-card.done {
            border-color: #22c55e;
        }

        .tool-call-card.failed {
            border-color: #ef4444;
        }

        .tool-call-icon {
            font-size: 0.9rem;
            line-height: 1.4;
            flex-shrink: 0;
        }

        .tool-call-body {
            flex: 1;
            min-width: 0;
        }

        .tool-call-name {
            font-family: monospace;
            font-weight: 600;
            color: var(--text-primary, #111827);
            word-break: break-all;
        }

        .tool-call-args {
            color: var(--text-muted, #6b7280);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .tool-call-status {
            flex-shrink: 0;
            color: var(--text-muted, #6b7280);
            font-size: 0.78rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .tool-spinner {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 2px solid #d1d5db;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }

        /* Markdown rendering for assistant messages */
        .message.assistant .message-content {
            white-space: normal;
        }

        .message.assistant .message-content > *:first-child { margin-top: 0; }
        .message.assistant .message-content > *:last-child { margin-bottom: 0; }

        .message.assistant .message-content h1,
        .message.assistant .message-content h2,
        .message.assistant .message-content h3,
        .message.assistant .message-content h4,
        .message.assistant .message-content h5,
        .message.assistant .message-content h6 {
            margin: 0.75em 0 0.3em;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-primary);
        }

        .message.assistant .message-content h1 { font-size: 1.35em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.2em; }
        .message.assistant .message-content h2 { font-size: 1.2em; }
        .message.assistant .message-content h3 { font-size: 1.05em; }

        .message.assistant .message-content p {
            margin: 0.45em 0;
            line-height: 1.65;
        }

        .message.assistant .message-content strong {
            font-weight: 700;
            color: var(--text-primary);
        }

        .message.assistant .message-content em {
            font-style: italic;
        }

        .message.assistant .message-content code {
            font-family: 'Courier New', Courier, monospace;
            background: rgba(0, 255, 0, 0.08);
            border: 1px solid rgba(0, 255, 0, 0.2);
            padding: 0.1em 0.35em;
            border-radius: 3px;
            font-size: 0.88em;
            color: var(--primary-color);
        }

        .message.assistant .message-content pre {
            background: var(--background-darker);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px 14px;
            overflow-x: auto;
            margin: 0.6em 0;
        }

        .message.assistant .message-content pre code {
            background: none;
            border: none;
            padding: 0;
            color: var(--text-secondary);
            font-size: 0.85em;
            white-space: pre;
        }

        .message.assistant .message-content ul,
        .message.assistant .message-content ol {
            margin: 0.35em 0 0.35em 1.6em;
            padding: 0;
        }

        .message.assistant .message-content li {
            margin: 0.2em 0;
            line-height: 1.55;
        }

        .message.assistant .message-content li > ul,
        .message.assistant .message-content li > ol {
            margin-top: 0.15em;
            margin-bottom: 0.15em;
        }

        .message.assistant .message-content table {
            border-collapse: collapse;
            margin: 0.6em 0;
            font-size: 0.9em;
            overflow-x: auto;
            display: block;
            max-width: 100%;
        }

        .message.assistant .message-content th,
        .message.assistant .message-content td {
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            text-align: left;
            white-space: nowrap;
        }

        .message.assistant .message-content th {
            background: rgba(0, 255, 0, 0.08);
            font-weight: 600;
            color: var(--text-primary);
        }

        .message.assistant .message-content tr:nth-child(even) td {
            background: rgba(255, 255, 255, 0.02);
        }

        .message.assistant .message-content blockquote {
            border-left: 3px solid var(--primary-color);
            margin: 0.5em 0;
            padding: 0.3em 0 0.3em 1em;
            color: var(--text-secondary);
            background: rgba(0, 255, 0, 0.04);
            border-radius: 0 4px 4px 0;
        }

        .message.assistant .message-content blockquote p { margin: 0.2em 0; }

        .message.assistant .message-content a {
            color: var(--primary-color);
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .message.assistant .message-content hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 0.75em 0;
        }

        .message.assistant .message-content del {
            text-decoration: line-through;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-brand">
                <img src="/static/robot-logo.svg" alt="Logo" class="navbar-logo">
                <span>Open Assistant</span>
                <span class="navbar-brand-short">OA</span>
            </div>
            <div class="navbar-links">
                <a href="/" class="nav-link">Chat</a>
                <a href="/artifacts" class="nav-link">Artifacts</a>
                <a href="/settings" class="nav-link">Settings</a>
                <a href="/monitoring" class="nav-link">Monitoring</a>
            </div>
            <button class="navbar-hamburger" id="navHamburger" aria-label="Toggle navigation" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-container">
        <div class="chat-layout" id="chatLayout">
            <!-- Conversation Sidebar -->
            <div class="conversation-sidebar" id="conversationSidebar">
                <div class="sidebar-header">
                    <h3>Conversations</h3>
                    <button class="sidebar-close-btn" id="sidebarCloseBtn">&times;</button>
                </div>
                <div class="sidebar-filters">
                    <input type="text" id="conversationSearch" placeholder="Search messages..." />
                    <select id="dateFilter">
                        <option value="all">All Time</option>
                        <option value="today">Today</option>
                        <option value="week">This Week</option>
                        <option value="month">This Month</option>
                        <option value="older">Older</option>
                    </select>
                </div>
                <div class="sidebar-content" id="conversationList">
                    <!-- Conversation cards rendered by JS -->
                </div>
                <div class="sidebar-footer">
                    <button id="loadMoreConversations" class="btn-secondary">Load More</button>
                </div>
            </div>

            <!-- Chat Container -->
            <div class="chat-container">
                <div class="chat-header">
                    <div class="chat-header-left">
                        <button id="toggleSidebarBtn" class="sidebar-toggle-btn" title="Toggle conversation history">
                            ☰
                        </button>
                        <div class="chat-header-title">Chat</div>
                    </div>
                    <div class="chat-header-actions">
                        <span class="conversation-id" id="conversationIdDisplay">New Conversation</span>
                        <button id="newConversationBtn">New Chat</button>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="message assistant">
                        <div class="message-content">
                            Hello! I'm your personal assistant. How can I help you today?
                        </div>
                    </div>
                </div>

                <div class="chat-input-container">
                    <textarea
                        id="messageInput"
                        placeholder="Type your message..."
                        rows="1"
                        autocomplete="off"
                    ></textarea>
                    <button id="sendButton">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/js/marked.min.js"></script>
    <script src="/static/js/purify.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/pwa.js"></script>
</body>
</html>
