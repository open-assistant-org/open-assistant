name: CI

on:
  pull_request:
    branches: [main]

jobs:
  whatsapp-bridge-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bridge dependencies
        run: npm ci --omit=dev
        working-directory: src/integrations/whatsapp/bridge
        env:
          # We use the system Chromium via executablePath; skip puppeteer's download.
          PUPPETEER_SKIP_DOWNLOAD: '1'

      - name: Locate system Chromium
        id: chromium
        run: |
          # ubuntu-latest typically has google-chrome-stable pre-installed;
          # fall back to installing chromium from apt if not.
          CHROMIUM_PATH=$(which chromium 2>/dev/null \
            || which chromium-browser 2>/dev/null \
            || which google-chrome-stable 2>/dev/null \
            || which google-chrome 2>/dev/null \
            || true)
          if [ -z "$CHROMIUM_PATH" ] || [ ! -x "$CHROMIUM_PATH" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends chromium
            CHROMIUM_PATH=$(which chromium)
          fi
          echo "path=$CHROMIUM_PATH" >> "$GITHUB_OUTPUT"
          echo "Chromium: $CHROMIUM_PATH ($($CHROMIUM_PATH --version 2>/dev/null || echo 'unknown version'))"

      - name: Validate Chromium launch flags (launch-check.js)
        run: node src/integrations/whatsapp/bridge/launch-check.js
        env:
          CHROMIUM_EXECUTABLE_PATH: ${{ steps.chromium.outputs.path }}

      - name: Test bridge HTTP server endpoints
        run: |
          BRIDGE_DIR="$(pwd)/src/integrations/whatsapp/bridge"
          # Launch via start-bridge.sh so the DBus setup (needed for Chrome >=114)
          # is exercised, matching how supervisord runs the bridge in production.
          CHROMIUM_EXECUTABLE_PATH="${{ steps.chromium.outputs.path }}" \
          WHATSAPP_SESSION_DIR="/tmp/wa-ci-session" \
          sh "$BRIDGE_DIR/start-bridge.sh" > /tmp/bridge-server.log 2>&1 &
          SERVER_PID=$!

          READY=0
          for i in $(seq 1 15); do
            curl -sf http://localhost:3001/health > /dev/null 2>&1 && READY=1 && break
            sleep 1
          done
          if [ "$READY" != "1" ]; then
            echo "=== server log ==="
            cat /tmp/bridge-server.log
            kill "$SERVER_PID" 2>/dev/null || true
            echo "Bridge server did not start within 15s" && exit 1
          fi

          fail() { echo "FAIL: $1"; cat /tmp/bridge-server.log; kill "$SERVER_PID" 2>/dev/null; exit 1; }

          curl -sf http://localhost:3001/health | grep -q '"status":"ok"' \
            || fail "/health did not return status ok"

          curl -sf http://localhost:3001/status | grep -q '"ready":false' \
            || fail "/status did not return ready:false"

          CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3001/send \
                   -H 'Content-Type: application/json' -d '{}')
          [ "$CODE" = "400" ] || fail "/send with empty body returned $CODE, want 400"

          CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3001/send \
                   -H 'Content-Type: application/json' \
                   -d '{"phone_number":"+15550001234","message":"ci-test"}')
          [ "$CODE" = "503" ] || fail "/send unauthenticated returned $CODE, want 503"

          CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3001/webhook \
                   -H 'Content-Type: application/json' -d '{}')
          [ "$CODE" = "400" ] || fail "/webhook with no url returned $CODE, want 400"

          curl -sf -X POST http://localhost:3001/webhook \
            -H 'Content-Type: application/json' \
            -d '{"url":"http://localhost:8080/api/whatsapp/webhook/incoming"}' \
            | grep -q '"success":true' || fail "/webhook configure returned unexpected response"

          kill "$SERVER_PID" 2>/dev/null || true
          echo "All bridge endpoint tests passed"

  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run black formatter check
        run: uv run black --check .

      - name: Run pytest
        run: uv run pytest --cov=src --cov-report=xml

      - name: Coverage Summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const xml = fs.readFileSync('coverage.xml', 'utf8');
            const covered = xml.match(/lines-covered="(\d+)"/);
            const total = xml.match(/lines-valid="(\d+)"/);
            if (covered && total) {
              const pct = Math.round((parseInt(covered[1]) / parseInt(total[1])) * 100);
              console.log(`Coverage: ${pct}% (${covered[1]}/${total[1]} lines)`);
            }

      - name: Upload coverage to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

      - name: Add coverage comment to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const xml = fs.readFileSync('coverage.xml', 'utf8');
            const covered = xml.match(/lines-covered="(\d+)"/);
            const total = xml.match(/lines-valid="(\d+)"/);
            const pct = covered && total
              ? Math.round((parseInt(covered[1]) / parseInt(total[1])) * 100)
              : '?';

            const body = `## Coverage\n\n**${pct}%** (${covered?.[1] || '?'}/${total?.[1] || '?'} lines)`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
